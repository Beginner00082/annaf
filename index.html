<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anna Run - Madonna dell'Arco</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial', sans-serif; }
  body { background: #f7f7f7; display: flex; justify-content: center; align-items: center; height: 100vh; }
  #game { position: relative; border: 2px solid #ddd; }
  canvas { background: #f7f7f7; display: block; }
  #ui { position: absolute; top: 10px; right: 10px; font-size: 20px; font-weight: bold; color: #333; }
  #start, #over { 
    position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
    background: rgba(247,247,247,0.95); display: flex; 
    flex-direction: column; justify-content: center; align-items: center; text-align: center;
  }
  .hidden { display: none !important; }
  h1 { font-size: 28px; color: #333; margin-bottom: 10px; }
  p { color: #666; margin-bottom: 15px; }
  button { 
    padding: 10px 25px; font-size: 18px; background: #333; color: white; 
    border: none; cursor: pointer;
  }
  button:hover { background: #555; }
</style>
</head>
<body>
<div id="game">
  <div id="ui">HI <span id="hi">0</span> <span id="score">0</span></div>
  <canvas id="canvas" width="600" height="150"></canvas>
  <div id="start">
    <h1>ANNA RUN</h1>
    <p>Premi SPAZIO per saltare</p>
    <button id="startBtn">Gioca</button>
  </div>
  <div id="over" class="hidden">
    <h1>GAME OVER</h1>
    <p>Punteggio: <span id="final">0</span></p>
    <button id="restartBtn">Rigioca</button>
  </div>
</div>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let score = 0;
let hi = localStorage.getItem('hi') || 0;
let speed = 6;
let gameRunning = false;
let obstacles = [];
let frame = 0;

const player = { x: 50, y: 110, w: 30, h: 40, vy: 0, jumping: false, gravity: 0.8 };

document.getElementById('hi').textContent = hi;
document.getElementById('startBtn').onclick = startGame;
document.getElementById('restartBtn').onclick = startGame;
document.addEventListener('keydown', e => {
  if (e.code === 'Space' && gameRunning) jump();
  if (e.code === 'Space' && !gameRunning) startGame();
});

function jump() {
  if (!player.jumping) {
    player.vy = -12;
    player.jumping = true;
  }
}

function startGame() {
  score = 0; speed = 6; obstacles = []; frame = 0; gameRunning = true;
  player.y = 110; player.vy = 0; player.jumping = false;
  document.getElementById('start').classList.add('hidden');
  document.getElementById('over').classList.add('hidden');
  loop();
}

function loop() {
  if (!gameRunning) return;
  
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  // Terra
  ctx.fillStyle = '#535353';
  ctx.fillRect(0, 140, canvas.width, 2);
  
  updatePlayer();
  drawPlayer();
  updateObstacles();
  drawObstacles();
  checkCollision();
  
  frame++;
  if (frame % 60 === 0) score++;
  if (frame % 300 === 0) speed += 0.5;
  
  document.getElementById('score').textContent = score.toString().padStart(5, '0');
  
  if (Math.random() < 0.02) spawnObstacle();
  
  requestAnimationFrame(loop);
}

function updatePlayer() {
  player.vy += player.gravity;
  player.y += player.vy;
  if (player.y >= 110) {
    player.y = 110;
    player.vy = 0;
    player.jumping = false;
  }
}

function drawPlayer() {
  // Gambe
  ctx.fillStyle = '#333';
  ctx.fillRect(player.x + 5, player.y + 25, 8, 15);
  ctx.fillRect(player.x + 17, player.y + 25, 8, 15);
  
  // Corpo
  ctx.fillStyle = '#e63946'; // vestito rosso
  ctx.fillRect(player.x + 5, player.y + 10, 20, 15);
  
  // Testa
  ctx.fillStyle = '#f4a261';
  ctx.fillRect(player.x + 10, player.y, 10, 10);
  
  // Capelli rossi
  ctx.fillStyle = '#d62828';
  ctx.fillRect(player.x + 8, player.y, 14, 5);
  
  // Bandiera sulla pancia con asta
  ctx.fillStyle = '#8B4513'; // asta marrone
  ctx.fillRect(player.x + 22, player.y - 5, 3, 20);
  ctx.fillStyle = '#e63946'; // bandiera rossa
  ctx.fillRect(player.x + 24, player.y - 5, 12, 8);
  ctx.fillStyle = '#ffd60a'; // dettagli gialli
  ctx.fillRect(player.x + 26, player.y - 3, 8, 4);
}

function spawnObstacle() {
  obstacles.push({ x: 600, y: 120, w: 20, h: 20 });
}

function drawObstacles() {
  ctx.fillStyle = '#457b9d';
  obstacles.forEach(o => {
    // Corpo ragazzo
    ctx.fillRect(o.x, o.y, o.w, o.h);
    // Testa
    ctx.fillRect(o.x + 5, o.y - 10, 10, 10);
  });
}

function updateObstacles() {
  obstacles.forEach(o => o.x -= speed);
  obstacles = obstacles.filter(o => o.x > -20);
}

function checkCollision() {
  obstacles.forEach(o => {
    if (o.x < player.x + player.w && o.x + o.w > player.x &&
        o.y < player.y + player.h && o.y + o.h > player.y) {
      endGame();
    }
  });
}

function endGame() {
  gameRunning = false;
  if (score > hi) {
    hi = score;
    localStorage.setItem('hi', hi);
    document.getElementById('hi').textContent = hi;
  }
  document.getElementById('final').textContent = score;
  document.getElementById('over').classList.remove('hidden');
}
</script>
</body>
  </html>
